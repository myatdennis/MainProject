[build]
builder = "nixpacks"
# buildCommand is handled by nixpacks.toml phases. Setting it here as a fallback.
buildCommand = "npm ci && npm run build:client"

[deploy]
startCommand = "node index.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[deploy.healthcheck]
path = "/api/health"
timeout = 60
