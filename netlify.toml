## Netlify build config
## WARNING: Do NOT place server-only secrets (service role keys, DB URLs, JWT secrets)
## in this file or in the Netlify Build environment. Server-only secrets must live
## only in your server runtime environment (Railway, Netlify Functions runtime env,
## or other backend host). The build safety check will fail if it detects server
## secrets present in client-facing VITE_* variables.

[build]
  command = "npm run build:client"
  publish = "dist"

# Only include client-safe build environment variables here. Keep server secrets
# out of the build environment.
[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=dev"
  NPM_CONFIG_PRODUCTION = "false"
  VITE_API_BASE_URL = "/api"
  VITE_ENABLE_WS = "false"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/sw-version.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/api/*"
  to = "https://api.the-huddle.co/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
