name: Legacy GitHub Pages Deploy (Manual Only)

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --cache /tmp/npm-cache

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Validation unit suites
        run: npx vitest run src/validation/__tests__/courseValidation.test.ts src/validation/__tests__/serverCourseValidation.test.ts src/contracts/__tests__/courseWriteContract.test.ts

      - name: Tenant isolation integration gates
        run: npm run -s test:integration:tenant-isolation

      - name: Auth bypass regression gates
        run: npm run -s test:auth-bypass-gate

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Course builder E2E gates
        run: npm run test:e2e -- tests/e2e/course_builder_concurrency.spec.ts tests/e2e/course_builder_feature_validation.spec.ts tests/e2e/course_builder_quiz_persistence.spec.ts

      - name: Write production env
        if: ${{ env.VITE_SUPABASE_URL != '' && env.VITE_SUPABASE_ANON_KEY != '' }}
        run: |
          echo "VITE_SUPABASE_URL=${{ env.VITE_SUPABASE_URL }}" >> .env.production
          echo "VITE_SUPABASE_ANON_KEY=${{ env.VITE_SUPABASE_ANON_KEY }}" >> .env.production
          echo "VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}" >> .env.production

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
