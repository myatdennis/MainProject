 
name: CI Build & Test

on:
  push:
    branches: [ main, master, develop, 'feat/**', 'fix/**' ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Assert Node version
        run: |
          node -e "const major=Number(process.versions.node.split('.')[0]); if (major < 20) { console.error('Node < 20 detected:', process.versions.node); process.exit(1); } console.log('Node version OK:', process.versions.node)"

      - name: Install dependencies (ci)
        run: npm ci

      - name: Check lockfile sync
        run: npm run check:lock

      - name: Verify Supabase schema (optional)
        run: |
          if [ -n "${DATABASE_URL}" ]; then
            npm run -s verify:schema
          else
            echo 'DATABASE_URL not configured in workflow environment; skipping schema verification step.'
          fi

      - name: Server typecheck
        run: npm run typecheck:server

      - name: Server WS origin tests
        run: npx vitest run --config vitest.server.config.ts

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run -s lint

      - name: Design consistency
        run: npm run -s check:design

      - name: Unit tests
        run: npm run -s test:run

      - name: Tenant isolation integration gates
        run: npm run -s test:integration:tenant-isolation

      - name: Auth bypass regression gates
        run: npm run -s test:auth-bypass-gate

      - name: Build
        run: npm run -s build

      - name: Bundle budget gate
        run: npm run -s check:bundle

      - name: Accessibility smoke (axe)
        run: |
          npm run -s preview -- --host 127.0.0.1 --port 4173 >/tmp/vite-preview.log 2>&1 &
          PREVIEW_PID=$!
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4173 >/dev/null; then
              break
            fi
            sleep 1
          done
          npx axe http://127.0.0.1:4173 --exit
          kill $PREVIEW_PID
          wait $PREVIEW_PID || true

      - name: Verify dist does not contain deprecated hosts
        run: |
          if [ -d dist ]; then
            npm run scan:dist || exit 2
          else
            echo 'dist directory missing; skipping scan';
          fi

      # Final cleanup: no duplicate steps


 
